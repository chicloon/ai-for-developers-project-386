name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: ghcr.io/${{ github.repository }}/web:latest
          build-args: |
            API_PROXY_URL=http://api:8080
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            ::add-mask::${{ secrets.GHCR_PAT }}
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin
            cd ~/ai-for-developers-project-386
            echo "=== Remove old images ==="
            docker rmi -f ghcr.io/chicloon/ai-for-developers-project-386/api:latest ghcr.io/chicloon/ai-for-developers-project-386/web:latest 2>/dev/null || true
            echo "=== Pull and recreate ==="
            docker compose pull --policy always
            docker compose up -d --force-recreate --pull always
            echo "=== Cleanup Docker ==="
            docker builder prune -f
            docker image prune -a -f
            docker container prune -f
            docker compose ps
            echo "=== Container status ==="
            docker inspect ai-for-developers-project-386-web-1 --format='{{.State.Health.Status}}' 2>/dev/null || echo "no health check"
            docker compose logs --tail=20
