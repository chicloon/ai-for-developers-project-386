services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: call_booking
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/chicloon/ai-for-developers-project-386/api:latest
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/call_booking?sslmode=disable
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-minimum-32-characters-long}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        API_PROXY_URL: http://api:8080
        BUILD_SHA: "compose-local"
    image: ghcr.io/chicloon/ai-for-developers-project-386/web:latest
    environment:
      API_PROXY_URL: "http://api:8080"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  pgdata:
